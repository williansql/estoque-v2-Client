<div class="flex h-screen w-full bg-gray-50 overflow-hidden font-sans relative text-slate-900">
  @if (isLoggedIn()) {
  <!-- Sidebar -->
  <app-sidebar></app-sidebar>

  <!-- Conteudo Inicial (USUARIO AUTENTICADO) -->
  <div class="flex flex-col flex-1 min-w-0">
    <app-header></app-header>
    <main class="flex-1 overflow-auto p-4 md:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
  } @else {
  <!-- Tela de Login (USUARIO NAO AUTENTICADO) -->
  <div class="flex-1 overflow-auto bg-white">
    <router-outlet></router-outlet>
  </div>
  }

  <!-- Global Toaster -->
  <z-toaster position="top-right" [richColors]="true" />
</div>
