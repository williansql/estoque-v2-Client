<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>SGI - Estoque</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="icone-estoque.png">

  <script>
    (function () {
      const html = document.documentElement;

      try {
        const theme = localStorage.theme;
        const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches ?? false;

        const isSystem = theme === 'system' || !('theme' in localStorage);
        const isDark = theme === 'dark' || (isSystem && prefersDark);
        const resolvedTheme = isDark ? 'dark' : 'light';
        html.classList.toggle('dark', isDark);
        html.classList.toggle('dark-theme', isDark);
        html.setAttribute('data-theme', theme ?? 'system');
        html.style.colorScheme = resolvedTheme;
      } catch (_) { }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>

<body>
  <app-root></app-root>
</body>

</html>
